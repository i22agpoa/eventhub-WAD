<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub | Create Event</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.png" alt="EventHub Logo" width="42" height="42" class="me-2 brand-logo">
        <span class="fw-bold brand-text">EventHub</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="details.html">Details</a></li>
          <li class="nav-item"><a class="nav-link activeS" href="create.html">Create Event</a></li>
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-banner">
    <div class="container text-center">
      <h1>Create a New Event</h1>
      <p>Fill in the form below to submit a new event proposal.</p>
    </div>
  </section>

  <main class="py-5">
    <div class="container">
      <div class="form-wrapper">
        <form>
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label">Event Title</label>
              <input type="text" class="form-control" placeholder="Enter event title">
            </div>

            <div class="col-md-6">
              <label class="form-label">Category</label>
              <select class="form-select">
                <option selected>Select category</option>
                <option>Technology</option>
                <option>Business</option>
                <option>Music</option>
                <option>Education</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Date</label>
              <input type="date" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" placeholder="Enter location">
            </div>

            <div class="col-md-6">
              <label class="form-label">Capacity</label>
              <input type="number" class="form-control" placeholder="Number of seats">
            </div>

            <div class="col-md-6">
              <label class="form-label">Organizer Name</label>
              <input type="text" class="form-control" placeholder="Enter organizer name">
            </div>

            <div class="col-12">
              <label class="form-label">Short Description</label>
              <textarea class="form-control" rows="5" placeholder="Write a short description of the event"></textarea>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary custom-btn">Submit Event</button>
              <button type="reset" class="btn btn-outline-secondary ms-2">Reset Form</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container text-center">
      <p class="mb-1">© 2026 EventHub. All rights reserved.</p>
      <p class="mb-0">Web Application Design Project</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
